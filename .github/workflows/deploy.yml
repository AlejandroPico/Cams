name: Deploy Cams

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund
      - name: Rebuild SQLite and camera exports
        run: python scripts/catalog/build_catalog.py
      - name: Validate SQLite and exported catalog
        run: |
          python - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          db_path = Path("data/cams.sqlite3")
          json_path = Path("public/data/cameras.json")
          seed_path = Path("src/data/catalog.seed.json")

          for path in (db_path, json_path, seed_path):
              if not path.is_file() or path.stat().st_size == 0:
                  raise SystemExit(f"Required catalog artifact is missing or empty: {path}")

          with sqlite3.connect(db_path) as connection:
              integrity = connection.execute("PRAGMA integrity_check").fetchone()[0]
              if integrity != "ok":
                  raise SystemExit(f"SQLite integrity check failed: {integrity}")
              database_count = connection.execute(
                  "SELECT COUNT(*) FROM cameras WHERE active=1 AND is_public=1"
              ).fetchone()[0]
              provider_counts = connection.execute(
                  "SELECT p.code, COUNT(*) FROM cameras c JOIN providers p ON p.id=c.provider_id "
                  "WHERE c.active=1 AND c.is_public=1 GROUP BY p.code ORDER BY COUNT(*) DESC"
              ).fetchall()

          exported = json.loads(json_path.read_text(encoding="utf-8")).get("cameras", [])
          bundled = json.loads(seed_path.read_text(encoding="utf-8")).get("cameras", [])

          if database_count < 100:
              raise SystemExit(f"Catalog regression: only {database_count} cameras were generated")
          if len(exported) != database_count or len(bundled) != database_count:
              raise SystemExit(
                  f"Catalog mismatch: SQLite={database_count}, public JSON={len(exported)}, bundle={len(bundled)}"
              )

          print(f"Validated {database_count} cameras")
          for provider, count in provider_counts:
              print(f"  {provider}: {count}")
          if database_count < 500:
              print(f"::warning::The catalog contains {database_count} cameras; the current target is at least 500")
          PY
      - name: Build production site
        run: npm run build
      - name: Persist SQLite and generated catalog
        run: |
          if git diff --quiet -- data/cams.sqlite3 public/data src/data/catalog.seed.json; then
            echo "Catalog already current"
          else
            git config user.name "cams-catalog-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/cams.sqlite3 public/data src/data/catalog.seed.json
            git commit -m "Actualizar SQLite y catálogo desplegado [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
