name: Deploy Cams

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: npm ci --no-audit --no-fund
      - name: Rebuild SQLite and camera exports
        run: python scripts/catalog/build_catalog.py
      - run: npm run build
      - name: Persist SQLite and generated catalog
        run: |
          if git diff --quiet -- data/cams.sqlite3 public/data src/data/catalog.seed.json; then
            echo "Catalog already current"
          else
            git config user.name "cams-catalog-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/cams.sqlite3 public/data src/data/catalog.seed.json
            git commit -m "Actualizar SQLite y catálogo desplegado [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
