name: Refresh public camera database

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: camera-catalog
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Refresh SQLite and JSON
        run: python scripts/catalog/build_catalog.py
      - name: Commit database changes
        run: |
          if git diff --quiet -- data/cams.sqlite3 public/data src/data/catalog.seed.json; then
            echo "No catalog changes"
            exit 0
          fi
          git config user.name "cams-catalog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cams.sqlite3 public/data src/data/catalog.seed.json
          git commit -m "Actualizar SQLite y catálogo público [skip ci]"
          git push
