name: Refresh public camera database

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: camera-catalog
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Refresh SQLite and JSON
        run: python scripts/catalog/run_catalog.py
      - name: Verify SQLite integrity
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          path = Path("data/cams.sqlite3")
          if not path.is_file() or path.stat().st_size == 0:
              raise SystemExit("data/cams.sqlite3 was not generated")
          with sqlite3.connect(path) as connection:
              result = connection.execute("PRAGMA integrity_check").fetchone()[0]
              count = connection.execute("SELECT COUNT(*) FROM cameras WHERE active=1 AND is_public=1").fetchone()[0]
          if result != "ok":
              raise SystemExit(f"SQLite integrity check failed: {result}")
          if count < 100:
              raise SystemExit(f"Catalog regression: only {count} cameras")
          print(f"SQLite valid: {count} public cameras")
          PY
      - name: Commit database changes
        run: |
          if [ -z "$(git status --porcelain -- data/cams.sqlite3 public/data src/data/catalog.seed.json)" ]; then
            echo "No catalog changes"
            exit 0
          fi
          git config user.name "cams-catalog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cams.sqlite3 public/data src/data/catalog.seed.json
          git commit -m "Actualizar SQLite y catálogo público [skip ci]"
          git push
