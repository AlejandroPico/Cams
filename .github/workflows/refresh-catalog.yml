name: Refresh free camera catalog

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python scripts/ingest/aggregate.py
      - name: Commit catalog changes
        run: |
          if git diff --quiet -- public/data; then
            echo "No catalog changes"
            exit 0
          fi
          git config user.name "cams-catalog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          git commit -m "Actualizar catálogo gratuito de cámaras"
          git push
